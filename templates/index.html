<!DOCTYPE html>
{%load static%}
<html>
	{% include 'base.html' %}
	<title>CredPy</title>
	<body>
		{% include 'nav.html' %}
		<div class="container">
    		<h3>Accounts</h3>
    		<nav>
    			<div class="nav-wrapper white">
	        		<div class="input-field">
          				<input id="user-input" type="search" required>
          				<label class="label-icon" for="search"><i class="material-icons">search</i></label>
          				<i class="material-icons" id="close">close</i>
        			</div>
    			</div>
    		</nav>
    		<div class="fixed-action-btn">
      			<a href="/addAccount" class="btn-floating purple waves-effect waves-circle waves-light btn-large"><i class="large material-icons">person_add</i></a>
    		</div>
    		<div id="replaceable-content">
    			{%include 'collection.html' %}	
    		</div>
    		<script type="text/javascript" src="{% static 'main.js' %}"></script>
    		<script type="text/javascript">
    			document.getElementById("close").addEventListener("click",clear)
    			function clear() {
    				$('#user-input').val('')
    				$('#user-input').keyup();
    			}
    		</script>
  		</div>
	</body>
</html>
